name: assignment
description: "ArvyaX – Immersive Session & Reflection Mini App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive_flutter: ^1.1.0
  just_audio: ^0.9.39
  google_fonts: ^6.2.1
  intl: ^0.19.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/ambiences.json
    - assets/audio/ambient_loop.wav
